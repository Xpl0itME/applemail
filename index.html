<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POC</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
  }
  .cta {
    padding: 16px 24px;
    background: #ff9900;
    color: #000;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
  }
</style>
</head>

<body>

<a
  id="cta"
  class="cta"
  data-store="amazon"
  href="https://www.amazon.in/s?k=BGMI%20Porsche%20Car%20Skin&tag=82427282-21"
  target="_blank"
  rel="nofollow sponsored"
  aria-label="POC"
  aria-disabled="false"
  data-app-link="com.amazon.mobile.shopping.web://amazon.in/s?k=BGMI%20Porsche%20Car%20Skin&tag=82427282-21"
>
  POC CLICK HERE
</a>

<script>
(function () {
  const cta = document.getElementById("cta");
  if (!cta) return;

  cta.addEventListener("click", function (e) {
    e.preventDefault();

    const appLink = cta.getAttribute("data-app-link");
    const webLink = cta.getAttribute("href");

    window.location.href = appLink;

   
    setTimeout(function () {
      window.open(webLink, "_blank");
    }, 300);
  });
})();
</script>

</body>
</html>
