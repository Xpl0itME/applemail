<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open Amazon App</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
  }

  button {
    padding: 16px 26px;
    font-size: 16px;
    font-weight: 600;
    background: #ff9900;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>

<body>

<button onclick="openAmazon()">
  Open in Amazon App
</button>

<script>
function openAmazon() {
  // Amazon app deep link
  window.location.href =
    "com.amazon.mobile.shopping.web://amazon.in/s?k=BGMI%20Porsche%20Car%20Skin&tag=82427282-21";

  // Fallback to web after 1.5s (if app not installed)
  setTimeout(function () {
    window.location.href =
      "https://www.amazon.in/s?k=BGMI%20Porsche%20Car%20Skin&tag=82427282-21";
  }, 1500);
}
</script>

</body>
</html>
