<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BGMI Porsche Car Skin</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: #f2f2f2;
    color: #000;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
    border-bottom: 1px solid #e5e5e5;
  }

  .content {
    flex: 1;
    padding: 24px 20px;
    text-align: center;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 12px;
  }

  p {
    font-size: 14px;
    color: #555;
    margin-bottom: 28px;
  }

  /* CTA styling only (HTML remains unchanged) */
  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 22px;
    background: #ff9900;
    color: #000;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
  }

  .cta svg {
    width: 20px;
    height: 20px;
    stroke: #000;
    fill: none;
    stroke-width: 2;
  }

  footer {
    padding: 14px;
    font-size: 11px;
    color: #666;
    text-align: center;
    border-top: 1px solid #e5e5e5;
  }
</style>
</head>

<body>

<div class="app">

  <header>Link Plox</header>

  <div class="content">
    <h1>BGMI Porsche Car Skin</h1>
    <p>
      We prepared this quick jump page to help you open the product
      directly in the Amazon app for a better experience.
    </p>

    <!-- YOUR CTA (UNCHANGED) -->
    <a
      id="cta"
      class="cta"
      data-store="amazon"
      href="https://www.amazon.in/s?k=BGMI%20Porsche%20Car%20Skin&tag=82427282-21"
      target="_blank"
      rel="nofollow sponsored"
      aria-label="Check Price on Amazon for BGMI Porsche Car Skin"
      aria-disabled="false"
      data-app-link="com.amazon.mobile.shopping.web://amazon.in/s?k=BGMI%20Porsche%20Car%20Skin&tag=82427282-21"
    >
      <!-- Cart icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.7 13.42a2 2 0 0 0 2 1.58h9.7a2 2 0 0 0 2-1.6L23 6H6"></path>
      </svg>

      <span class="cta-text" data-role="cta-text">
        Check Price on Amazon
      </span>

      <!-- External icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
        <polyline points="15 3 21 3 21 9"></polyline>
        <line x1="10" y1="14" x2="21" y2="3"></line>
      </svg>
    </a>
  </div>

  <footer>
    Affiliate disclosure: Some links on this page are affiliate links.
    We may earn a commission at no extra cost to you.
  </footer>

</div>

<script>
(function () {
  const cta = document.getElementById("cta");
  if (!cta) return;

  cta.addEventListener("click", function (e) {
    const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (!isiOS) return;

    const appLink = cta.getAttribute("data-app-link");
    if (!appLink) return;

    e.preventDefault();

    // Try opening Amazon app (triggers iOS popup)
    window.location.href = appLink;

    // Fallback to web
    setTimeout(function () {
      window.location.href = cta.getAttribute("href");
    }, 1200);
  });
})();
</script>

</body>
</html>
