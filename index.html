<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Open iPhone Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #007aff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button onclick="openCalculator()">Open Calculator</button>

<script>
function openCalculator() {
    window.location.href = "calculator://";
}
</script>

</body>
</html>
